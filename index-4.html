<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lotus Academic Guidance System</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="top-nav">
      <button class="brand-btn" onclick="show('homePage')" data-i18n="appTitle">Lotus Academic Guidance System</button>
      <div class="nav-actions">
        <button onclick="show('homePage')" data-i18n="home">Home</button>
        <button onclick="show('dashboardPage')" data-i18n="dashboard">Dashboard</button>
        <button onclick="goGuide()" data-i18n="studyGuide">Study Guide</button>
        <button onclick="goAdvisor()" data-i18n="advisor">Registration Advisor</button>
        <select id="languageSelect" aria-label="Language">
          <option value="en">English</option>
          <option value="ar">العربية</option>
        </select>
      </div>
    </nav>

    <div id="homePage" class="page active-page">
      <h1 data-i18n="appTitle">Lotus Academic Guidance System</h1>
      <p data-i18n="selectFaculty">Select Your Faculty</p>

      <div id="facultyCards" class="cards-grid"></div>

      <div id="yearSection" class="selection-panel">
        <h3 data-i18n="selectAcademicData">Select Academic Data</h3>

        <label>
          <span data-i18n="year">Year</span>
          <select id="yearSelect"></select>
        </label>

        <label>
          <span data-i18n="semester">Semester</span>
          <select id="semesterSelect"></select>
        </label>

        <label>
          <span data-i18n="specialization">Specialization</span>
          <select id="specializationSelect"></select>
        </label>

        <button onclick="goToLogin()" data-i18n="continue">Continue</button>
      </div>
    </div>

    <div id="loginPage" class="page">
      <div class="login-box">
        <h2 data-i18n="studentLogin">Student Login</h2>
        <input id="studentName" data-i18n-placeholder="studentNamePlaceholder" placeholder="Enter your name" />
        <input id="email" data-i18n-placeholder="emailPlaceholder" placeholder="University Email" />
        <input id="password" type="password" data-i18n-placeholder="passwordPlaceholder" placeholder="Password" />
        <button onclick="login()" data-i18n="login">Login</button>
      </div>
    </div>

    <div id="dashboardPage" class="page">
      <div class="dashboard-box">
        <h2 id="welcomeText"></h2>
        <p id="selectedInfo"></p>
        <button onclick="goAdvisor()" data-i18n="advisor">Registration Advisor</button>
        <button onclick="goGuide()" data-i18n="studyGuide">Study Guide</button>
        <button onclick="show('homePage')" data-i18n="changeFaculty">Change Faculty</button>
      </div>
    </div>

    <div id="guidePage" class="page content-page">
      <div class="content-box">
        <button class="back-btn" onclick="show('dashboardPage')" data-i18n="back">Back</button>
        <h2 data-i18n="studyGuide">Study Guide</h2>
        <p id="guideTitle"></p>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th data-i18n="courseCode">Course Code</th>
                <th data-i18n="courseTitle">Course Title</th>
                <th data-i18n="prerequisites">Prerequisites</th>
                <th data-i18n="lecture">Lecture</th>
                <th data-i18n="lab">Lab / Practical</th>
                <th data-i18n="creditHours">Credit Hours</th>
              </tr>
            </thead>
            <tbody id="guideTable"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="advisorPage" class="page content-page">
      <div class="content-box advisor-box">
        <button class="back-btn" onclick="show('dashboardPage')" data-i18n="back">Back</button>
        <h2 data-i18n="advisor">Registration Advisor</h2>
        <p id="facultyName"></p>

        <label id="gpaField">
          <span data-i18n="gpa">GPA</span>
          <input id="gpa" type="number" min="0" max="4" step="0.01" placeholder="GPA" />
        </label>

        <label id="failedSubjectsField">
          <span data-i18n="failedSubjects">Failed Subjects</span>
          <select id="failedSubjects" multiple></select>
        </label>

        <button onclick="recommend()" data-i18n="getRecommendation">Get Recommendation</button>
        <div id="result"></div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
